
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Undangan Buka Puasa</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    max-width:500px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(255,215,0,0.3);
}

h1{
    font-weight:600;
    font-size:28px;
}

.countdown{
    font-size:20px;
    margin:15px 0;
    color:gold;
}

input, select{
    width:90%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    border:none;
}

button{
    background:gold;
    color:black;
    padding:10px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

iframe{
    width:100%;
    height:250px;
    border-radius:15px;
}

.total{
    margin-top:15px;
    font-size:18px;
    color:#00ffcc;
}

/* Animasi lampu */
.lamp{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-around;
}

.lamp span{
    width:10px;
    height:10px;
    background:gold;
    border-radius:50%;
    animation:blink 1s infinite alternate;
}

@keyframes blink{
    from{opacity:0.3;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="lamp">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<audio autoplay loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1>🌙 Undangan Buka Puasa 🌙</h1>

    <p>Assalamu’alaikum Wr. Wb.</p>
    <p>Mari hadir dalam acara berbuka puasa bersama</p>

    <p><b>Sabtu, 15 Maret 2026</b><br>
    17.00 WIB - Selesai</p>

    <div class="countdown" id="countdown"></div>

    <h3>Lokasi</h3>
    <iframe src="https://maps.app.goo.gl/rKKBCQRRAF6xL895A"></iframe>

    <h3>Konfirmasi Kehadiran</h3>

    <input type="text" id="nama" placeholder="Nama Anda" required>
    <input type="number" id="jumlah" placeholder="Jumlah Hadir" min="1" required>

    <select id="status">
        <option value="Hadir">Hadir</option>
        <option value="Tidak Hadir">Tidak Hadir</option>
    </select>

    <button onclick="kirimData()">Kirim Konfirmasi</button>

    <div class="total">
        Total Hadir Saat Ini: <span id="totalHadir">0</span> Orang
    </div>
</div>

<script>
// === COUNTDOWN ===
var countDate = new Date("Mar 9, 2026 17:00:00").getTime();
setInterval(function(){
    var now = new Date().getTime();
    var gap = countDate - now;

    var d = Math.floor(gap/(1000*60*60*24));
    var h = Math.floor((gap%(1000*60*60*24))/(1000*60*60));
    var m = Math.floor((gap%(1000*60*60))/(1000*60));
    var s = Math.floor((gap%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
    "Menuju Buka Puasa: "+d+" Hari "+h+" Jam "+m+" Menit "+s+" Detik";
},1000);


// === AMBIL TOTAL HADIR ===
fetch("https://script.google.com/macros/s/AKfycbyMI1hxxDcEsiTQDWVM2vzakkAK4hgUSk50_2xt5bycRVRZyotCvwglwQw5WWiaqVEmxQ/exec")
.then(res=>res.json())
.then(data=>{
    document.getElementById("totalHadir").innerText = data.total;
});


// === KIRIM DATA ===
function kirimData(){
    var nama = document.getElementById("nama").value;
    var jumlah = document.getElementById("jumlah").value;
    var status = document.getElementById("status").value;

    var data = {nama:nama, jumlah:jumlah, status:status};

    fetch("https://script.google.com/macros/s/AKfycbyMI1hxxDcEsiTQDWVM2vzakkAK4hgUSk50_2xt5bycRVRZyotCvwglwQw5WWiaqVEmxQ/exec",{
        method:"POST",
        body:JSON.stringify(data)
    }).then(()=>{
        alert("Konfirmasi berhasil dikirim");
        location.reload();
    });

    var pesan = `Konfirmasi Buka Puasa:%0A
Nama: ${nama}%0A
Jumlah: ${jumlah}%0A
Status: ${status}`;

    window.open("https://wa.me/6281388991730?text="+pesan,"_blank");
}
</script>

</body>
</html>
