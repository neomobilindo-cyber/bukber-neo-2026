<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buka Puasa Bersama</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

.card {
  background: #1e1e1e;
  padding: 25px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #ff9800;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.popup {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 25px;
  border-radius: 10px;
  color: white;
  display: none;
  font-weight: bold;
}
.success { background: green; }
.error { background: red; }
.warning { background: orange; }

.counter {
  margin-top: 15px;
  font-size: 14px;
  color: #ccc;
}
</style>
</head>
<body>

<div class="card">
  <h1>Buka Puasa Bersama</h1>
  <p>Senin, 9 Maret 2026</p>

  <form id="formKehadiran">
    <input type="text" name="nama" placeholder="Nama Anda" required>
    <input type="number" name="jumlah" placeholder="Jumlah Orang" required min="1">
    <select name="status" required>
      <option value="">Pilih Kehadiran</option>
      <option value="Hadir">Hadir</option>
      <option value="Tidak Hadir">Tidak Hadir</option>
    </select>
    <button type="submit">Kirim</button>
  </form>

  <div class="counter">
    Total Hadir: <span id="totalHadir">0</span> / 50
  </div>
</div>

<div id="popup" class="popup"></div>

<script>
const SCRIPT_URL = "PASTE_URL_EXEC_ANDA_DISINI";

const form = document.getElementById("formKehadiran");
const popup = document.getElementById("popup");
const totalHadir = document.getElementById("totalHadir");

/* ===== Popup Modern ===== */
function showPopup(message, type) {
  popup.innerText = message;
  popup.className = "popup " + type;
  popup.style.display = "block";
  setTimeout(() => {
    popup.style.display = "none";
  }, 3000);
}

/* ===== Ambil Total Hadir ===== */
function loadTotal() {
  fetch(SCRIPT_URL)
    .then(res => res.json())
    .then(data => {
      if (data.status === "SUCCESS") {
        totalHadir.innerText = data.total;
      }
    });
}

loadTotal();

/* ===== Submit Form ===== */
form.addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "SUCCESS") {
      showPopup("✅ Data berhasil dikirim!", "success");
      form.reset();
      loadTotal();
    }

    else if (data.status === "DUPLIKAT") {
      showPopup("⚠ Nama sudah terdaftar!", "warning");
    }

    else if (data.status === "FULL") {
      showPopup("❌ Kuota sudah penuh!", "error");
    }

    else {
      showPopup("❌ Gagal mengirim data!", "error");
    }

  })
  .catch(() => {
    showPopup("❌ Tidak terhubung ke server!", "error");
  });
});
</script>

</body>
</html>
