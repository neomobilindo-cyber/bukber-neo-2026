<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Buka Puasa Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#000,#1a1a1a,#2b2b2b);
    color:#fff;
    overflow-x:hidden;
}

/* COVER */
.cover{
    position:fixed;
    width:100%;
    height:100vh;
    background:radial-gradient(circle,#000,#111);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
    z-index:999;
}

.envelope{
    width:70%;
    max-width:240px;
    height:140px;
    background:gold;
    position:relative;
    cursor:pointer;
    border-radius:12px;
}

.envelope:before{
    content:'';
    position:absolute;
    top:-70px;
    left:0;
    width:100%;
    height:70px;
    background:#d4af37;
    clip-path:polygon(0 100%,50% 0,100% 100%);
}

.fade-in-name{
    opacity:0;
    transform:translateY(20px) scale(0.95);
    animation:fadeZoom 2s ease forwards;
}

@keyframes fadeZoom{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* CARD */
.card{
    width:92%;
    max-width:600px;
    margin:40px auto;
    padding:25px 20px;
    background:rgba(255,215,0,0.06);
    border-radius:20px;
    box-shadow:0 0 30px rgba(255,215,0,0.3);
    display:none;
}

h1{
    font-family:'Playfair Display',serif;
    color:gold;
    font-size:24px;
}

.countdown{
    font-size:16px;
    margin:15px 0;
    color:#ffd700;
}

input,select{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:12px;
    border:none;
    font-size:16px;
}

button{
    width:100%;
    background:gold;
    color:black;
    padding:14px;
    border:none;
    border-radius:15px;
    font-weight:bold;
    font-size:16px;
    margin-top:10px;
}

iframe{
    width:100%;
    height:220px;
    border-radius:15px;
    border:none;
}

.total{
    margin-top:15px;
    font-size:15px;
    color:#00ffcc;
    text-align:center;
}

/* Stars */
.star{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:1;}
}

/* Responsive tweak */
@media (min-width:768px){
    .countdown{font-size:18px;}
    h1{font-size:28px;}
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover">
    <div class="envelope" onclick="openInvite()"></div>
    <h3 style="color:gold;margin-top:30px;">Klik Amplop Untuk Membuka Undangan</h3>
    <p id="coverNama" style="color:gold;font-size:18px;margin-top:10px;"></p>
</div>

<!-- AUDIO -->
<audio id="bgm" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<audio id="adzan">
    <source src="adzan.mp3" type="audio/mpeg">
</audio>

<!-- CONTENT -->
<div class="card" id="card">
    <h1>🌙 Buka Puasa Bersama 🌙</h1>
    <p id="namaTamu" style="color:#ffd700;"></p>

    <p>Assalamu’alaikum Wr. Wb.</p>
    <p>Kami mengundang Anda untuk hadir dalam acara berbuka puasa bersama neo mobilindo.</p>

    <p><b>Sabtu, 9 Maret 2026</b><br>
    17.00 WIB - Selesai</p>

    <div class="countdown" id="countdown"></div>

    <h3>Lokasi</h3>
    <iframe src="https://www.google.com/maps/embed?pb=YOUR_MAP_LINK"></iframe>

    <h3>Konfirmasi Kehadiran</h3>
    <input type="text" id="nama" placeholder="Nama Anda">
    <input type="number" id="jumlah" placeholder="Jumlah Hadir">
    <select id="status">
        <option value="Hadir">Hadir</option>
        <option value="Tidak Hadir">Tidak Hadir</option>
    </select>

    <button onclick="kirimData()">Kirim Konfirmasi</button>

    <div class="total">
        Total Hadir: <span id="totalHadir">0</span>
    </div>
</div>

<script>

// buka amplop
function openInvite(){
    document.getElementById("cover").style.display="none";
    document.getElementById("card").style.display="block";
    document.getElementById("bgm").play();
}

// ambil nama dari URL
function getParameterByName(name){
    var url=new URL(window.location.href);
    return url.searchParams.get(name);
}

var tamu=getParameterByName('to');

if(tamu){
    var coverText=document.getElementById("coverNama");
    coverText.innerHTML="Undangan Untuk<br><strong style='font-size:22px'>"+tamu+"</strong>";
    coverText.classList.add("fade-in-name");

    document.getElementById("namaTamu").innerHTML="Kepada Yth.<br><strong>"+tamu+"</strong>";
    document.getElementById("nama").value=tamu;
}

// countdown
var countDate=new Date("Mar 15, 2026 17:00:00").getTime();
setInterval(function(){
    var now=new Date().getTime();
    var gap=countDate-now;

    if(gap<=60000 && gap>0){
        document.getElementById("adzan").play();
    }

    var d=Math.floor(gap/(1000*60*60*24));
    var h=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
    var m=Math.floor((gap%(1000*60*60))/(1000*60));
    var s=Math.floor((gap%(1000*60))/1000);

    document.getElementById("countdown").innerHTML=
    d+" Hari "+h+" Jam "+m+" Menit "+s+" Detik menuju berbuka";
},1000);

// ambil total hadir
fetch("https://script.google.com/macros/s/AKfycbyMI1hxxDcEsiTQDWVM2vzakkAK4hgUSk50_2xt5bycRVRZyotCvwglwQw5WWiaqVEmxQ/exec")
.then(res=>res.json())
.then(data=>{
    document.getElementById("totalHadir").innerText =
        data.total + " / " + data.max;
});

// kirim data
function kirimData(){
    var nama=document.getElementById("nama").value;
    var jumlah=document.getElementById("jumlah").value;
    var status=document.getElementById("status").value;

    var data={nama:nama,jumlah:jumlah,status:status};

    fetch("YOUR_GOOGLE_SCRIPT_URL",{
        method:"POST",
        body:JSON.stringify(data)
    })
    .then(res=>res.json())
    .then(response=>{
        if(response.status=="FULL"){
            alert("Maaf, kuota sudah penuh 🙏");
            return;
        }

        alert("Konfirmasi berhasil dikirim 🎉");

        var pesan=`Konfirmasi Buka Puasa:%0A
Nama:${nama}%0A
Jumlah:${jumlah}%0A
Status:${status}`;

        window.open("https://wa.me/6281388991730?text="+pesan,"_blank");
        location.reload();
    });
}

// stars
for(let i=0;i<80;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";
    document.body.appendChild(star);
}
</script>

</body>
</html>
