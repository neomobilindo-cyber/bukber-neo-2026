<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Buka Puasa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#000,#1a1a1a,#2b2b2b);
color:#fff;
overflow-x:hidden;
}

/* COVER */
.cover{
position:fixed;
width:100%;
height:100vh;
background:radial-gradient(circle,#000,#111);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
z-index:999;
}

.envelope{
width:70%;
max-width:240px;
height:140px;
background:gold;
border-radius:12px;
cursor:pointer;
}

.envelope:before{
content:'';
position:absolute;
}

.fade-in-name{
opacity:0;
transform:translateY(20px) scale(0.95);
animation:fadeZoom 2s ease forwards;
}

@keyframes fadeZoom{
to{opacity:1;transform:translateY(0) scale(1);}
}

/* CARD */
.card{
width:92%;
max-width:600px;
margin:40px auto;
padding:25px 20px;
background:rgba(255,215,0,0.06);
border-radius:20px;
box-shadow:0 0 30px rgba(255,215,0,0.3);
display:none;
}

h1{
font-family:'Playfair Display',serif;
color:gold;
font-size:24px;
}

.countdown{
font-size:16px;
margin:15px 0;
color:#ffd700;
}

input,select{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:none;
font-size:16px;
}

button{
width:100%;
background:gold;
color:black;
padding:14px;
border:none;
border-radius:15px;
font-weight:bold;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

button:disabled{
background:#999;
cursor:not-allowed;
}

iframe{
width:100%;
height:220px;
border-radius:15px;
border:none;
}

.total{
margin-top:15px;
font-size:15px;
color:#00ffcc;
text-align:center;
}

#notif{
display:none;
margin-top:15px;
padding:12px;
border-radius:10px;
font-size:14px;
}

/* Stars */
.star{
position:fixed;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="cover" id="cover">
<div class="envelope" onclick="openInvite()"></div>
<h3 style="color:gold;margin-top:30px;">Klik Amplop Untuk Membuka Undangan</h3>
<p id="coverNama" style="color:gold;font-size:18px;margin-top:10px;"></p>
</div>

<audio id="bgm" loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<audio id="adzan">
<source src="adzan.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">
<h1>🌙 Buka Puasa Bersama 🌙</h1>
<p id="namaTamu" style="color:#ffd700;"></p>

<p>Assalamu’alaikum Wr. Wb.</p>
<p>Mengundang teman2 untuk berbuka puasa bersama.</p>

<p><b>Senin, 9 Maret 2026</b><br>16.00 WIB - Selesai</p>

<div class="countdown" id="countdown"></div>

<h3>Lokasi</h3>
<iframe src="https://www.google.com/maps/embed?pb=https://www.google.com/maps/place/HeHa+Forest/@-7.626253,110.424458,17z/data=!3m1!4b1!4m6!3m5!1s0x2e7a61c56c5d6cf3:0x6f49678c04608c08!8m2!3d-7.626253!4d110.424458!16s%2Fg%2F11sjzr73hb?entry=ttu&g_ep=EgoyMDI2MDMwMy4wIKXMDSoASAFQAw%3D%3D"></iframe>

<h3>Konfirmasi Kehadiran</h3>
<input type="text" id="nama" placeholder="Nama Anda">
<input type="number" id="jumlah" placeholder="Jumlah Hadir">
<select id="status">
<option value="Hadir">Hadir</option>
<option value="Tidak Hadir">Tidak Hadir</option>
</select>

<button id="btnKirim" onclick="kirimData()">Kirim Konfirmasi</button>

<div id="notif"></div>

<div class="total">
Total Hadir: <span id="totalHadir">0</span>
</div>
</div>

<script>

const MAX_KUOTA = 50;

// buka undangan
function openInvite(){
document.getElementById("cover").style.display="none";
document.getElementById("card").style.display="block";
document.getElementById("bgm").play();
}

// ambil nama URL
var url=new URL(window.location.href);
var tamu=url.searchParams.get("to");

if(tamu){
let coverText=document.getElementById("coverNama");
coverText.innerHTML="Undangan Untuk<br><strong style='font-size:22px'>"+tamu+"</strong>";
coverText.classList.add("fade-in-name");

document.getElementById("namaTamu").innerHTML="Kepada :<br><strong>"+tamu+"</strong>";
document.getElementById("nama").value=tamu;
}

// countdown
var countDate=new Date("Mar 9, 2026 17:00:00").getTime();
setInterval(function(){
var now=new Date().getTime();
var gap=countDate-now;

if(gap<=60000 && gap>0){
document.getElementById("adzan").play();
}

var d=Math.floor(gap/(1000*60*60*24));
var h=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
var m=Math.floor((gap%(1000*60*60))/(1000*60));
var s=Math.floor((gap%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
d+" Hari "+h+" Jam "+m+" Menit "+s+" Detik menuju berbuka";
},1000);

// ambil total hadir
fetch("Yhttps://script.google.com/macros/s/AKfycbyMI1hxxDcEsiTQDWVM2vzakkAK4hgUSk50_2xt5bycRVRZyotCvwglwQw5WWiaqVEmxQ/exec")
.then(res=>res.json())
.then(data=>{
document.getElementById("totalHadir").innerText =
data.total + " / " + data.max;
});

// kirim data
function kirimData(){

let nama=document.getElementById("nama").value.trim();
let jumlah=document.getElementById("jumlah").value;
let status=document.getElementById("status").value;
let btn=document.getElementById("btnKirim");
let notif=document.getElementById("notif");

if(!nama || !jumlah){
notif.style.display="block";
notif.style.background="#ff4444";
notif.innerHTML="Mohon lengkapi data terlebih dahulu.";
return;
}

btn.disabled=true;
btn.innerText="Mengirim...";

fetch("https://script.google.com/macros/s/AKfycbyMI1hxxDcEsiTQDWVM2vzakkAK4hgUSk50_2xt5bycRVRZyotCvwglwQw5WWiaqVEmxQ/exec",{
method:"POST",
body:JSON.stringify({nama:nama,jumlah:jumlah,status:status})
})
.then(res=>res.json())
.then(response=>{

notif.style.display="block";

if(response.status=="FULL"){
notif.style.background="#ff9800";
notif.innerHTML="Maaf, kuota sudah penuh 🙏";
btn.disabled=false;
btn.innerText="Kirim Konfirmasi";
return;
}

if(response.status=="DUPLIKAT"){
notif.style.background="#ff4444";
notif.innerHTML="Data sudah pernah dikirim sebelumnya ❌";
return;
}

if(response.status=="SUCCESS"){
notif.style.background="#00c853";
notif.innerHTML="✅ Data berhasil terkirim. Terima kasih!";
btn.innerText="Terkirim";
btn.disabled=true;

document.getElementById("totalHadir").innerText =
response.total + " / " + MAX_KUOTA;

var pesan=`Konfirmasi Buka Puasa:%0A
Nama:${nama}%0A
Jumlah:${jumlah}%0A
Status:${status}`;

window.open("https://wa.me/6281388991730?text="+pesan,"_blank");
}
});
}

// stars
for(let i=0;i<80;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
document.body.appendChild(star);
}

</script>

</body>
</html>
